<ion-app>
  <!-- Custom Animated Splash Screen -->
  <div class="custom-splash" *ngIf="showSplash" [class.fade-out]="fadeSplash">
    <div class="splash-content">
      <div class="logo-wrapper">
        <div class="circular-spinner"></div>
        <img src="assets/oli-logo.png" alt="OliOne Logo" class="splash-logo" />
      </div>
    </div>
  </div>

  <!-- Side Menu Setup -->
  <ion-split-pane contentId="main-content">
    <ion-menu contentId="main-content" type="overlay">
      <ion-header>
        <ion-toolbar class="menu-toolbar">
          <ion-title>
            <img src="assets/olione-home.png" alt="OliOne Logo" class="menu-logo" />
          </ion-title>
        </ion-toolbar>
      </ion-header>

      <ion-content>
        <ion-list>
          <!-- Menu Items Navigation -->
          <ion-menu-toggle auto-hide="false">
            <ion-item lines="none" routerLink="/main/home" routerDirection="root">
              <ion-icon slot="start" class="fa-solid fa-house"></ion-icon>
              <ion-label>Home</ion-label>
            </ion-item>
            <ion-item lines="none" routerLink="/profile-settings" routerDirection="root">
              <ion-icon slot="start" class="fa-solid fa-user-gear"></ion-icon>
              <ion-label>Profile Settings</ion-label>
            </ion-item>
            <ion-item lines="none" routerLink="/about-us" routerDirection="root">
              <ion-icon slot="start" class="fa-solid fa-circle-info"></ion-icon>
              <ion-label>About Us</ion-label>
            </ion-item>
            <ion-item lines="none" routerLink="/terms-and-conditions" routerDirection="root">
              <ion-icon slot="start" class="fa-solid fa-file-contract"></ion-icon>
              <ion-label>Terms & Conditions</ion-label>
            </ion-item>
            <ion-item lines="none" routerLink="/data-privacy-policy" routerDirection="root">
              <ion-icon slot="start" class="fa-solid fa-shield-halved"></ion-icon>
              <ion-label>Privacy Policy</ion-label>
            </ion-item>
          </ion-menu-toggle>
        </ion-list>
      </ion-content>

      <ion-footer>
        <ion-menu-toggle auto-hide="false">
          <ion-item (click)="logout()" lines="none" class="ion-margin-bottom logout-btn" detail="false" button>
            <ion-icon slot="start" class="fa-solid fa-arrow-right-from-bracket" color="danger"></ion-icon>
            <ion-label color="danger">Log Out</ion-label>
          </ion-item>
        </ion-menu-toggle>
      </ion-footer>
    </ion-menu>

    <!-- Main router outlet -->
    <ion-router-outlet id="main-content"></ion-router-outlet>
  </ion-split-pane>
</ion-app>
