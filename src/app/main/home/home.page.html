<ion-header>
  <ion-toolbar class="home-toolbar">
    <ion-buttons slot="start">
      <ion-menu-button class="header-icon-btn"></ion-menu-button>
    </ion-buttons>
    <ion-title>
      <img src="../../assets/one-home.png" alt="OliHome Logo"
        style="height: 50px; max-width: 200px; object-fit: contain; vertical-align: middle; margin-top: 3px;" />
    </ion-title>
    <ion-buttons slot="end">
      <ion-button class="header-icon-btn">
        <ion-icon class="fa-solid fa-bell"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content class="feed-bg">
  <ion-refresher slot="fixed" (ionRefresh)="handleRefresh($event)">
    <ion-refresher-content></ion-refresher-content>
  </ion-refresher>

  <div class="feed-container">
    <ion-card class="create-post-card">
      <ion-item lines="none" class="post-header-item">
        <ion-avatar slot="start">
          <img [src]="userAvatar" alt="My avatar" />
        </ion-avatar>
        <ion-input class="post-input" type="text" placeholder="What's on your mind?" [(ngModel)]="newPostContent"></ion-input>
      </ion-item>
      
      <!-- Media Preview Area -->
      <div *ngIf="newPostImage || newPostVideo" class="media-preview ion-padding-horizontal">
        <div *ngIf="newPostImage" class="preview-item">
          <img [src]="newPostImage" />
          <ion-fab-button size="small" color="dark" class="close-btn" (click)="clearMedia()">
            <ion-icon name="close"></ion-icon>
          </ion-fab-button>
        </div>
        <div *ngIf="newPostVideo" class="preview-item">
          <video [src]="newPostVideo" controls></video>
          <ion-fab-button size="small" color="dark" class="close-btn" (click)="clearMedia()">
            <ion-icon name="close"></ion-icon>
          </ion-fab-button>
        </div>
      </div>

      <!-- Hidden File Inputs -->
      <input type="file" #imageInput (change)="onMediaSelected($event, 'image')" accept="image/*" style="display: none;" />
      <input type="file" #videoInput (change)="onMediaSelected($event, 'video')" accept="video/*" style="display: none;" />

      <div class="post-actions-top">
        <div class="action-buttons">
          <ion-button fill="clear" size="small" class="media-btn" (click)="triggerImageInput()">
            <ion-icon class="fa-solid fa-image" color="success"></ion-icon>
          </ion-button>
          <ion-button fill="clear" size="small" class="media-btn" (click)="triggerVideoInput()">
            <ion-icon class="fa-solid fa-video" color="danger"></ion-icon>
          </ion-button>
        </div>
        <ion-button fill="solid" color="primary" class="btn-post" shape="round" (click)="createPost()" [disabled]="!newPostContent.trim() && !newPostImage && !newPostVideo">
          Post
        </ion-button>
      </div>
    </ion-card>

    <!-- Feed Placeholder -->
    <div *ngIf="posts.length === 0" class="ion-text-center ion-padding" style="margin-top: 40px;">
      <ion-icon class="fa-solid fa-satellite-dish" style="font-size: 54px; color: #d1d5db; margin-bottom: 10px;"></ion-icon>
      <h3 style="color: #6b7280; font-weight: 600; margin: 0 0 5px 0;">Feed Empty</h3>
      <p style="color: #9ca3af; font-size: 14px; margin: 0;">Real posts from other users will be available here soon.</p>
    </div>

    <!-- Feed Posts Dynamically Loaded -->
    <ion-card class="feed-post" *ngFor="let post of posts">
      <ion-item lines="none" class="post-header">
        <ion-avatar slot="start">
          <img [src]="post.authorAvatar" />
        </ion-avatar>
        <ion-label>
          <h2 class="author">{{ post.authorName }}</h2>
          <p class="time">{{ post.time }}</p>
        </ion-label>
        <ion-button fill="clear" color="medium" slot="end" class="more-btn" (click)="openPostOptions(post)">
          <ion-icon class="fa-solid fa-ellipsis-vertical"></ion-icon>
        </ion-button>
      </ion-item>
      
      <div class="post-content" *ngIf="post.content">
        {{ post.content }}
      </div>
      
      <div class="media-container" *ngIf="post.image || post.video">
        <img *ngIf="post.image" [src]="post.image" alt="Post Image" class="post-media" />
        
        <div *ngIf="post.video" class="video-wrapper">
          <video *ngIf="post.video.startsWith('data:')" [src]="post.video" controls class="post-media"></video>
          <div *ngIf="!post.video.startsWith('data:')" class="placeholder-video">
            <div class="video-overlay"><ion-icon class="fa-solid fa-play"></ion-icon></div>
            <img [src]="post.video" alt="Video Placeholder" class="post-media" />
          </div>
        </div>
      </div>

      <div class="post-actions-modern">
        <div class="start-actions">
          <ion-button fill="clear" class="action-btn" (click)="toggleLike(post)">
            <ion-icon [class]="post.likedByMe ? 'fa-solid fa-heart' : 'fa-regular fa-heart'" [color]="post.likedByMe ? 'danger' : ''"></ion-icon>
            <span class="count" [style.color]="post.likedByMe ? 'var(--ion-color-danger)' : ''">{{ post.likes }}</span>
          </ion-button>
          <ion-button fill="clear" class="action-btn" (click)="openComments(post)">
             <ion-icon class="fa-regular fa-comment"></ion-icon>
             <span class="count">{{ post.comments }}</span>
          </ion-button>
        </div>
        <div class="end-actions">
           <ion-button fill="clear" class="action-btn" (click)="sharePost(post)">
             <ion-icon class="fa-solid fa-share-nodes"></ion-icon>
           </ion-button>
        </div>
      </div>

      <!-- Inline Comments Drawer -->
      <div class="comments-drawer" *ngIf="post.showComments" style="border-top: 1px solid #f3f4f6; padding: 10px 16px;">
        <div class="comments-list" *ngIf="post.commentsList && post.commentsList.length > 0">
          <ion-item lines="none" *ngFor="let comment of post.commentsList" style="--background: transparent; --padding-start: 0; margin-bottom: 10px;">
            <ion-avatar slot="start" style="width: 32px; height: 32px; align-self: flex-start; margin-top: 4px;">
              <img [src]="comment.authorAvatar" />
            </ion-avatar>
            <ion-label class="ion-text-wrap" style="background: #f3f4f6; padding: 8px 12px; border-radius: 16px; margin: 0; position: relative;">
              <h3 style="font-weight: 600; font-size: 13px; margin: 0 0 2px 0;">{{ comment.authorName }} <span style="font-weight: 400; color: #9ca3af; font-size: 11px; margin-left: 5px;">{{ comment.time }}</span></h3>
              
              <!-- Normal State -->
              <div *ngIf="!comment.isEditing">
                <p style="color: #4b5563; font-size: 13px; margin: 0;">{{ comment.text }}</p>
                <!-- Actions -->
                <div style="margin-top: 4px; display: flex; gap: 10px;">
                  <span (click)="startEditComment(comment)" style="font-size: 11px; font-weight: 600; color: #6b7280; cursor: pointer;">Edit</span>
                </div>
              </div>

              <!-- Editing State -->
              <div *ngIf="comment.isEditing" style="margin-top: 5px;">
                <ion-textarea autoGrow="true" [(ngModel)]="comment.editedText" style="background: white; border-radius: 8px; font-size: 13px; --padding-start: 8px; --padding-end: 8px; min-height: 40px; border: 1px solid #d1d5db;"></ion-textarea>
                <div style="margin-top: 6px; display: flex; justify-content: flex-end; gap: 10px;">
                  <span (click)="cancelEditComment(comment)" style="font-size: 12px; font-weight: 600; color: #6b7280; cursor: pointer;">Cancel</span>
                  <span (click)="saveEditComment(comment)" style="font-size: 12px; font-weight: 600; color: #3b82f6; cursor: pointer;">Save</span>
                </div>
              </div>
            </ion-label>
          </ion-item>
        </div>
        
        <div *ngIf="!post.commentsList || post.commentsList.length === 0" style="padding: 10px 0; text-align: center;">
          <p style="color: #9ca3af; font-size: 13px; margin: 0;">Write the first comment!</p>
        </div>

        <ion-item lines="none" style="--background: #f9fafb; --border-radius: 20px; border: 1px solid #e5e7eb; margin-top: 10px;">
          <ion-input placeholder="Write a comment..." style="font-size: 14px;" [(ngModel)]="post.newCommentText"></ion-input>
          <ion-button slot="end" fill="clear" color="primary" style="margin: 0; --padding-end: 5px; text-transform: none; font-weight: 600;" (click)="addComment(post)" [disabled]="!post.newCommentText || post.newCommentText.trim() === ''">Post</ion-button>
        </ion-item>
      </div>
    </ion-card>
  </div>
</ion-content>
